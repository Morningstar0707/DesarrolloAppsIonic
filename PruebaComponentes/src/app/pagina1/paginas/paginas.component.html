<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Prueba de componentes en IONIC</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <div id="container">
    <ion-toolbar>
       <p><strong class="capitalize">Media Cards</strong></p>
    </ion-toolbar>
    <ion-card>
      <img alt="Silhouette of mountains" src="https://taleofronin.com/wp-content/uploads/2023/01/Oni_Tale-of-Ronin-768x432.jpg" />
      <ion-card-header>
        <ion-card-title id="fontcard">Oni: The Fierce Japanese Demon</ion-card-title>
        <ion-card-subtitle>Mythology / January 26, 2023</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
       An oni is a type of yokai, supernatural creatures, monsters, and spirits, found in Japanese mythology. 
      </ion-card-content>
    </ion-card>
  </div>

</ion-content>

<ion-footer>
  <ion-toolbar>
    <div id="container">
      Git: <a target="_blank" rel="noopener noreferrer"
        href="https://github.com/Morningstar0707">github.com/Morningstar0707</a>
    </div>
  </ion-toolbar>
</ion-footer>
